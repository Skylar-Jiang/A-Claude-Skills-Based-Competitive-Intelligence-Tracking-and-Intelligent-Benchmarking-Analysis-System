  <h1>6月18日：“农产品批发价格200指数”比昨天下降0.05个点</h1>
  <div class="time">时间：2026-06-18</div>
  <div class="TRS_Editor">
    <p>据农业农村部监测，重点监测的28种蔬菜平均价格为4.26元/公斤，比昨天下降1.6%。</p>
    <p>价格降幅前五名的是豆角、生菜、黄瓜、菠菜和油菜，幅度分别为5.2%、3.6%、3.1%、3.0%和2.9%。</p>
